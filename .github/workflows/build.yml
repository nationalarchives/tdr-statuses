name: TDR Tag and pre deploy
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  pre-deploy:
    permissions:
      contents: write
      id-token: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/lambda_build.yml@9214d929d74b527c75cdac14ba96812f90b3ebba # v0.0.35
    with:
      lambda-name: statuses
      repo-name: tdr-statuses
      artifact-name: statuses
      build-command: |
        sbt assembly
    secrets:
      MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
  deploy:
    needs: pre-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh workflow run deploy.yml -f environment=intg -f to-deploy=${{ needs.pre-deploy.outputs.next-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
